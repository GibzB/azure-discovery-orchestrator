# Azure DevOps Pipeline — Infrastructure Deployment (Bicep)
# Triggers on changes to infra/ on main branch
# Requires: Azure Resource Manager service connection named 'azure-discoveryai-sc'

trigger:
  branches:
    include: [main]

pr: none

parameters:
  - name: environment
    displayName: Target Environment
    type: string
    default: dev
    values: [dev, test, prod]

variables:
  resourceGroup: 'rg-discoveryai-${{ parameters.environment }}'
  location: 'italynorth'
  serviceConnection: 'azure-discoveryai-sc'

stages:
  - stage: Validate
    displayName: Validate Bicep
    jobs:
      - job: Lint
        displayName: Lint & What-if
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Install Bicep CLI
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: az bicep install

          - task: AzureCLI@2
            displayName: Bicep lint
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: az bicep lint --file infra/main.bicep

          - task: AzureCLI@2
            displayName: Ensure resource group exists
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az group create \
                  --name $(resourceGroup) \
                  --location $(location) \
                  --tags environment=${{ parameters.environment }} project=azure-discovery-orchestrator

          - task: AzureCLI@2
            displayName: What-if (dry run)
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az deployment group what-if \
                  --resource-group $(resourceGroup) \
                  --template-file infra/main.bicep \
                  --parameters infra/environments/${{ parameters.environment }}.bicepparam

  - stage: Deploy
    displayName: Deploy Infrastructure
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - deployment: DeployBicep
        displayName: Deploy Bicep
        pool:
          vmImage: ubuntu-latest
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: Wait for active deployments to finish
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      echo "Checking for active deployments in $(resourceGroup)..."
                      for i in $(seq 1 18); do
                        ACTIVE=$(az deployment group list \
                          --resource-group $(resourceGroup) \
                          --query "[?properties.provisioningState=='Running'].name" \
                          -o tsv 2>/dev/null)
                        COUNT=$(echo "$ACTIVE" | grep -c . || echo "0")
                        echo "  Attempt $i: active = $COUNT"
                        if [ "$COUNT" = "0" ] || [ -z "$ACTIVE" ]; then
                          echo "  Clear — proceeding."
                          break
                        fi
                        if [ "$i" = "18" ]; then
                          echo "$ACTIVE" | while read -r dep; do
                            [ -n "$dep" ] && az deployment group cancel --resource-group $(resourceGroup) --name "$dep" 2>/dev/null && echo "  Cancelled: $dep" || true
                          done
                          sleep 15
                        else
                          sleep 20
                        fi
                      done

                - task: AzureCLI@2
                  displayName: Deploy Bicep
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az deployment group create \
                        --resource-group $(resourceGroup) \
                        --template-file infra/main.bicep \
                        --parameters infra/environments/${{ parameters.environment }}.bicepparam \
                        --name "deploy-$(Build.BuildId)"

                - task: AzureCLI@2
                  displayName: Print deployment outputs
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az deployment group show \
                        --resource-group $(resourceGroup) \
                        --name "deploy-$(Build.BuildId)" \
                        --query properties.outputs -o json
