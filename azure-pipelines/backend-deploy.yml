# Azure DevOps Pipeline — Backend Build & Deploy
# Builds Docker image, pushes to ACR, updates Container App
# Requires:
#   - Azure Resource Manager service connection: 'azure-discoveryai-sc'
#   - Docker Registry service connection: 'acr-discoveryai-sc'
#   - Variable group: 'discoveryai-dev' with ACR_LOGIN_SERVER

trigger:
  branches:
    include: [main]

pr: none

parameters:
  - name: environment
    displayName: Target Environment
    type: string
    default: dev
    values: [dev, test, prod]

variables:
  - group: discoveryai-${{ parameters.environment }}
  - name: imageTag
    value: $(ACR_LOGIN_SERVER)/backend:$(Build.SourceVersion)
  - name: containerAppName
    value: discoveryai-ca-backend-${{ parameters.environment }}
  - name: resourceGroup
    value: rg-discoveryai-${{ parameters.environment }}
  - name: serviceConnection
    value: azure-discoveryai-sc
  - name: dockerConnection
    value: acr-discoveryai-sc

stages:
  # ── Stage 1: Test ────────────────────────────────────────────────────────
  - stage: Test
    displayName: Run Tests
    jobs:
      - job: PytestJob
        displayName: Pytest (smoke + unit)
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            displayName: Use Python 3.12
            inputs:
              versionSpec: '3.12'

          - script: |
              cd backend
              pip install --quiet -r requirements.txt
            displayName: Install dependencies

          - script: |
              cd backend
              python -m pytest tests/ -v --tb=short --junit-xml=test-results.xml
            displayName: Run pytest
            env:
              # Provide dummy env vars so Settings() loads without error
              AZURE_OPENAI_ENDPOINT: https://dummy.openai.azure.com/
              AZURE_OPENAI_KEY: dummy
              AZURE_SPEECH_KEY: dummy
              SEARCH_ENDPOINT: https://dummy.search.windows.net
              SEARCH_KEY: dummy
              COSMOS_ENDPOINT: https://dummy.documents.azure.com:443/
              COSMOS_KEY: dummy
              STORAGE_CONNECTION_STRING: ""

          - task: PublishTestResults@2
            displayName: Publish test results
            condition: always()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: backend/test-results.xml
              testRunTitle: Backend Unit Tests

  # ── Stage 2: Build ────────────────────────────────────────────────────────
  - stage: Build
    displayName: Build & Push Image
    dependsOn: Test
    condition: succeeded()
    jobs:
      - job: BuildPush
        displayName: Docker Build & Push
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: Docker@2
            displayName: Build & push to ACR
            inputs:
              command: buildAndPush
              containerRegistry: $(dockerConnection)
              repository: backend
              dockerfile: backend/Dockerfile
              buildContext: backend
              tags: |
                $(Build.SourceVersion)
                latest

  # ── Stage 3: Deploy ────────────────────────────────────────────────────────
  - stage: Deploy
    displayName: Deploy to Container Apps
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployCA
        displayName: Update Container App
        pool:
          vmImage: ubuntu-latest
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: Attach ACR credentials (idempotent, non-fatal)
                  continueOnError: true
                  name: acrAttach
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az containerapp registry set \
                        --name $(containerAppName) \
                        --resource-group $(resourceGroup) \
                        --server $(ACR_LOGIN_SERVER) \
                        --username $(ACR_USERNAME) \
                        --password $(ACR_PASSWORD)

                - bash: |
                    if [ "$(Agent.JobStatus)" = "SucceededWithIssues" ] || [ "$ATTACH_FAILED" = "true" ]; then
                      echo "⚠️  ACR credential attachment failed or was skipped."
                      echo "    This is non-fatal — credentials may already be set."
                      echo "    If image pull fails, check ACR_USERNAME / ACR_PASSWORD variables."
                    else
                      echo "✅ ACR credentials attached successfully."
                    fi
                  displayName: Log ACR credential attachment result
                  env:
                    ATTACH_FAILED: $(acrAttach.result)

                - task: AzureCLI@2
                  displayName: Wait for Container App ready
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      echo "Waiting for any in-progress operation to complete..."
                      STATE=""
                      for i in $(seq 1 12); do
                        STATE=$(az containerapp show \
                          --name $(containerAppName) \
                          --resource-group $(resourceGroup) \
                          --query "properties.provisioningState" -o tsv 2>/dev/null)
                        echo "  Attempt $i: provisioningState=$STATE"
                        if [ "$STATE" = "Succeeded" ] || [ "$STATE" = "Failed" ]; then
                          break
                        fi
                        sleep 10
                      done
                      if [ "$STATE" != "Succeeded" ]; then
                        echo "❌ Container App is not in Succeeded state (state='$STATE'). Aborting."
                        exit 1
                      fi
                      echo "✅ Container App is ready."

                - task: AzureCLI@2
                  displayName: Update Container App image
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      # Update image only — env vars are managed separately.
                      # Do NOT pass --set-env-vars here; it would wipe all existing vars.
                      az containerapp update \
                        --name $(containerAppName) \
                        --resource-group $(resourceGroup) \
                        --image $(imageTag) \
                        --set-env-vars \
                          "AZURE_OPENAI_ENDPOINT=$(AZURE_OPENAI_ENDPOINT)" \
                          "AZURE_OPENAI_KEY=" \
                          "AZURE_FOUNDRY_ENDPOINT=https://discoveryai-aisvc-dev.cognitiveservices.azure.com/" \
                          "AZURE_OPENAI_DEPLOYMENT=$(AZURE_OPENAI_DEPLOYMENT)" \
                          "AZURE_OPENAI_API_VERSION=$(AZURE_OPENAI_API_VERSION)" \
                          "AZURE_SPEECH_KEY=$(AZURE_SPEECH_KEY)" \
                          "AZURE_SPEECH_REGION=$(AZURE_SPEECH_REGION)" \
                          "AZURE_SPEECH_VOICE=$(AZURE_SPEECH_VOICE)" \
                          "SEARCH_ENDPOINT=$(SEARCH_ENDPOINT)" \
                          "SEARCH_KEY=$(SEARCH_KEY)" \
                          "SEARCH_INDEX=$(SEARCH_INDEX)" \
                          "COSMOS_ENDPOINT=$(COSMOS_ENDPOINT)" \
                          "COSMOS_KEY=$(COSMOS_KEY)" \
                          "COSMOS_DATABASE=$(COSMOS_DATABASE)" \
                          "COSMOS_CONTAINER=$(COSMOS_CONTAINER)" \
                          "STORAGE_CONNECTION_STRING=$(STORAGE_CONNECTION_STRING)" \
                          "STORAGE_REPORTS_CONTAINER=reports" \
                          "STORAGE_KNOWLEDGEBASE_CONTAINER=knowledgebase" \
                          "CORS_ORIGINS_RAW=$(CORS_ORIGINS)" \
                          "LOG_LEVEL=INFO" \
                          "ENV=${{ parameters.environment }}"

                - task: AzureCLI@2
                  displayName: Ensure managed identity is enabled
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      # az containerapp update --set-env-vars can silently reset identity.
                      # Re-assign system-assigned managed identity after every deploy.
                      az containerapp identity assign \
                        --name $(containerAppName) \
                        --resource-group $(resourceGroup) \
                        --system-assigned \
                        --output none
                      echo "✅ Managed identity (system-assigned) confirmed."

                - task: AzureCLI@2
                  displayName: Verify deployment
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az containerapp show \
                        --name $(containerAppName) \
                        --resource-group $(resourceGroup) \
                        --query "{fqdn:properties.configuration.ingress.fqdn, state:properties.provisioningState}" \
                        -o table

                - task: AzureCLI@2
                  displayName: Prune old ACR images (keep latest + 2 SHAs)
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      TAGS=$(az acr repository show-tags \
                        --name $(ACR_NAME) \
                        --repository backend \
                        --orderby time_desc \
                        --output tsv | grep -v '^latest$' | tail -n +3)
                      if [ -z "$TAGS" ]; then
                        echo "Nothing to prune."
                      else
                        echo "Pruning: $TAGS"
                        while IFS= read -r tag; do
                          az acr repository delete \
                            --name $(ACR_NAME) \
                            --image "backend:${tag}" \
                            --yes 2>/dev/null && echo "  deleted: $tag" || true
                        done <<< "$TAGS"
                      fi
                      echo "✅ ACR pruned — keeping latest + 2 most recent SHAs"
