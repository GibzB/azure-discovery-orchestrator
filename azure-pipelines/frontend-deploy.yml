# Azure DevOps Pipeline — Frontend Build & Deploy to Blob Storage
# Builds React/Vite app and uploads to Azure Blob Storage static website
# Requires variable group: 'discoveryai-dev' with VITE_API_BASE_URL

trigger:
  branches:
    include: [main]

pr: none

parameters:
  - name: environment
    displayName: Target Environment
    type: string
    default: dev
    values: [dev, test, prod]

variables:
  - group: discoveryai-${{ parameters.environment }}
  - name: storageAccount
    value: discoveryaiswa${{ parameters.environment }}
  - name: serviceConnection
    value: azure-discoveryai-sc

stages:
  - stage: BuildDeploy
    displayName: Build & Deploy Frontend
    jobs:
      - job: BuildDeployJob
        displayName: Vite Build + Blob Upload
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: UseNode@1
            displayName: Use Node 20
            inputs:
              version: '20.x'

          - script: |
              cd frontend
              if [ ! -f package-lock.json ]; then
                npm install
              else
                npm ci
              fi
            displayName: Install dependencies

          - script: cd frontend && npm run build
            displayName: Vite build
            env:
              VITE_API_BASE_URL: $(VITE_API_BASE_URL)

          - task: AzureCLI@2
            displayName: Upload to Blob Storage $web
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                # Upload all assets with long cache
                az storage blob upload-batch \
                  --account-name $(storageAccount) \
                  --auth-mode key \
                  --source frontend/dist \
                  --destination '$web' \
                  --overwrite true \
                  --content-cache-control "public, max-age=31536000" \
                  --pattern "**" 2>&1 || true

                # Re-upload HTML with no-cache so users always get latest
                az storage blob upload-batch \
                  --account-name $(storageAccount) \
                  --auth-mode key \
                  --source frontend/dist \
                  --destination '$web' \
                  --overwrite true \
                  --content-cache-control "no-cache" \
                  --pattern "*.html"

                echo "Frontend live at: $(az storage account show \
                  --name $(storageAccount) \
                  --resource-group rg-discoveryai-${{ parameters.environment }} \
                  --query primaryEndpoints.web -o tsv)"
