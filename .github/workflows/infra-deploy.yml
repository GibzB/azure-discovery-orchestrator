name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, test, prod]

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (Workload Identity Federation)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: az bicep install

      - name: Bicep lint
        run: az bicep lint --file infra/main.bicep

      - name: Ensure resource group exists
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          az group create \
            --name "rg-discoveryai-${ENV}" \
            --location italynorth \
            --tags environment="${ENV}" project=azure-discovery-orchestrator

      - name: What-if (dry run)
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          az deployment group what-if \
            --resource-group "rg-discoveryai-${ENV}" \
            --template-file infra/main.bicep \
            --parameters "infra/environments/${ENV}.bicepparam"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (Workload Identity Federation)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Wait for active deployments to finish
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          RG="rg-discoveryai-${ENV}"
          echo "Checking for active deployments in $RG..."
          for i in $(seq 1 18); do
            ACTIVE=$(az deployment group list \
              --resource-group "$RG" \
              --query "[?properties.provisioningState=='Running'].name" \
              -o tsv 2>/dev/null)
            COUNT=$(echo "$ACTIVE" | grep -c . || echo "0")
            echo "  Attempt $i: active deployments = $COUNT"
            if [ "$COUNT" = "0" ] || [ -z "$ACTIVE" ]; then
              echo "  No active deployments — proceeding."
              break
            fi
            if [ "$i" = "18" ]; then
              echo "  Timed out — cancelling stale deployments..."
              echo "$ACTIVE" | while read -r dep; do
                [ -n "$dep" ] && az deployment group cancel --resource-group "$RG" --name "$dep" 2>/dev/null && echo "  Cancelled: $dep" || true
              done
              sleep 15
            else
              sleep 20
            fi
          done

      - name: Deploy Bicep
        env:
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          SEARCH_KEY: ${{ secrets.SEARCH_KEY }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
          STORAGE_CONNECTION_STRING: ${{ secrets.STORAGE_CONNECTION_STRING }}
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          az deployment group create \
            --resource-group "rg-discoveryai-${ENV}" \
            --template-file infra/main.bicep \
            --parameters "infra/environments/${ENV}.bicepparam" \
            --parameters \
              azureOpenAiKey="$AZURE_OPENAI_KEY" \
              azureSpeechKey="$AZURE_SPEECH_KEY" \
              searchKey="$SEARCH_KEY" \
              cosmosKey="$COSMOS_KEY" \
              storageConnectionString="$STORAGE_CONNECTION_STRING" \
            --name "deploy-$(date +%Y%m%d%H%M%S)"

      - name: Restore managed identity on Container App
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          # Bicep deploy may reset the managed identity — re-assign after every infra deploy.
          az containerapp identity assign \
            --name "discoveryai-ca-backend-${ENV}" \
            --resource-group "rg-discoveryai-${ENV}" \
            --system-assigned \
            --output none || true
          echo "✅ Managed identity (system-assigned) confirmed."
