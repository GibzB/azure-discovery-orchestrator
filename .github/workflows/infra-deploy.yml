name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, test, prod]

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (Workload Identity Federation)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: az bicep install

      - name: Bicep lint
        run: az bicep lint --file infra/main.bicep

      - name: Ensure resource group exists
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          az group create \
            --name "rg-discoveryai-${ENV}" \
            --location italynorth \
            --tags environment="${ENV}" project=azure-discovery-orchestrator

      - name: What-if (dry run)
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          az deployment group what-if \
            --resource-group "rg-discoveryai-${ENV}" \
            --template-file infra/main.bicep \
            --parameters "infra/environments/${ENV}.bicepparam"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (Workload Identity Federation)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          az deployment group create \
            --resource-group "rg-discoveryai-${ENV}" \
            --template-file infra/main.bicep \
            --parameters "infra/environments/${ENV}.bicepparam" \
            --name "deploy-$(date +%Y%m%d%H%M%S)"
