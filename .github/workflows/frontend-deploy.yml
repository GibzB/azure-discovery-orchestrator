name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, test, prod]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy to Blob Storage
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      # Use Node 22 LTS — Node 20 is deprecated on GitHub runners
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Azure Login
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload to Blob Storage
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          STORAGE_ACCOUNT="discoveryaiswa${ENV}"

          # Assets — long cache (content-hashed filenames)
          az storage blob upload-batch \
            --account-name "$STORAGE_ACCOUNT" \
            --auth-mode key \
            --source frontend/dist \
            --destination '$web' \
            --overwrite true \
            --content-cache-control "public, max-age=31536000, immutable" \
            --pattern "assets/**"

          # HTML — no cache so users always get the latest shell
          az storage blob upload-batch \
            --account-name "$STORAGE_ACCOUNT" \
            --auth-mode key \
            --source frontend/dist \
            --destination '$web' \
            --overwrite true \
            --content-cache-control "no-cache, no-store, must-revalidate" \
            --pattern "*.html"

      - name: Print URL
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          echo "✅ Frontend: $(az storage account show \
            --name discoveryaiswa${ENV} \
            --resource-group rg-discoveryai-${ENV} \
            --query primaryEndpoints.web -o tsv)"
