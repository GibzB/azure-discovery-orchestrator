name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, test, prod]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy to Blob Storage
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Generate package-lock.json if missing
      - name: Install dependencies
        working-directory: frontend
        run: |
          if [ ! -f package-lock.json ]; then
            npm install
          else
            npm ci
          fi

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Azure Login (Workload Identity Federation)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload to Blob Storage ($web container)
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          STORAGE_ACCOUNT="discoveryaiswa${ENV}"
          az storage blob upload-batch \
            --account-name "$STORAGE_ACCOUNT" \
            --auth-mode key \
            --source frontend/dist \
            --destination '$web' \
            --overwrite true \
            --content-cache-control "public, max-age=31536000" \
            --pattern "**" 2>&1 || true
          # Set short cache for HTML files (force refresh on deploy)
          az storage blob upload-batch \
            --account-name "$STORAGE_ACCOUNT" \
            --auth-mode key \
            --source frontend/dist \
            --destination '$web' \
            --overwrite true \
            --content-cache-control "no-cache" \
            --pattern "*.html"

      - name: Print frontend URL
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          STORAGE_ACCOUNT="discoveryaiswa${ENV}"
          echo "Frontend URL: $(az storage account show \
            --name $STORAGE_ACCOUNT \
            --resource-group rg-discoveryai-${ENV} \
            --query primaryEndpoints.web -o tsv)"
