name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, test, prod]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install --quiet -r backend/requirements.txt

      - name: Run pytest
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short --junit-xml=test-results.xml
        env:
          AZURE_OPENAI_ENDPOINT: https://dummy.openai.azure.com/
          AZURE_OPENAI_KEY: dummy
          AZURE_SPEECH_KEY: dummy
          SEARCH_ENDPOINT: https://dummy.search.windows.net
          SEARCH_KEY: dummy
          COSMOS_ENDPOINT: https://dummy.documents.azure.com:443/
          COSMOS_KEY: dummy
          STORAGE_CONNECTION_STRING: ""

      - name: Publish test results
        uses: actions/upload-artifact@v4.4.3
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results.xml

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      image_sha: ${{ steps.meta.outputs.image_sha }}
      deploy_env: ${{ steps.meta.outputs.deploy_env }}

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Azure Login (Workload Identity Federation)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name discoveryaiacr

      - name: Build & push
        id: meta
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          SHA="${{ github.sha }}"
          docker build \
            -t "discoveryaiacr.azurecr.io/backend:${SHA}" \
            -t "discoveryaiacr.azurecr.io/backend:latest" \
            ./backend
          docker push "discoveryaiacr.azurecr.io/backend:${SHA}"
          docker push "discoveryaiacr.azurecr.io/backend:latest"
          echo "image_sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "deploy_env=${ENV}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ needs.build.outputs.deploy_env }}

    steps:
      - name: Azure Login (Workload Identity Federation)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Wait for Container App to be ready
        env:
          APP_NAME: discoveryai-ca-backend-${{ needs.build.outputs.deploy_env }}
          APP_RG: rg-discoveryai-${{ needs.build.outputs.deploy_env }}
        run: |
          for i in $(seq 1 18); do
            STATE=$(az containerapp show --name "$APP_NAME" --resource-group "$APP_RG" \
              --query "properties.provisioningState" -o tsv 2>/dev/null)
            echo "  Attempt $i: $STATE"
            [ "$STATE" = "Succeeded" ] || [ "$STATE" = "Failed" ] && break
            sleep 10
          done
          [ "$STATE" = "Succeeded" ] && echo "✅ Ready" || (echo "❌ Not ready: $STATE"; exit 1)

      - name: Build Container App YAML patch and deploy
        env:
          APP_NAME: discoveryai-ca-backend-${{ needs.build.outputs.deploy_env }}
          APP_RG: rg-discoveryai-${{ needs.build.outputs.deploy_env }}
          APP_IMAGE: discoveryaiacr.azurecr.io/backend:${{ needs.build.outputs.image_sha }}
          APP_ENV: ${{ needs.build.outputs.deploy_env }}
          SECRET_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          SECRET_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          SECRET_SEARCH_KEY: ${{ secrets.SEARCH_KEY }}
          SECRET_COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
          SECRET_STORAGE_CONN: ${{ secrets.STORAGE_CONNECTION_STRING }}
        run: |
          # Fetch current Container App definition
          az containerapp show \
            --name "$APP_NAME" \
            --resource-group "$APP_RG" \
            -o json > /tmp/ca_current.json

          # Use Python to safely patch the JSON with new image + env vars
          # (avoids all shell quoting issues with special chars in values)
          python3 << 'PYEOF'
          import os, json, subprocess, sys

          with open("/tmp/ca_current.json") as f:
              ca = json.load(f)

          # Strip read-only/system fields that az containerapp update --yaml rejects
          for key in ("id", "name", "type", "location", "systemData", "resourceGroup",
                      "customDomainVerificationId", "delegatedIdentities"):
              ca.pop(key, None)
          props = ca.get("properties", {})
          for key in ("provisioningState", "runningStatus", "latestRevisionName",
                      "latestReadyRevisionName", "latestRevisionFqdn", "eventStreamEndpoint",
                      "outboundIpAddresses", "managedEnvironmentId", "environmentId",
                      "workloadProfileName"):
              props.pop(key, None)
          # Strip identity block — managed identity is configured separately
          ca.pop("identity", None)

          env_vars = [
              {"name": "ENV",                             "value": os.environ["APP_ENV"]},
              {"name": "LOG_LEVEL",                       "value": "INFO"},
              {"name": "AZURE_OPENAI_ENDPOINT",           "value": "https://discoveryai-aisvc-dev.openai.azure.com/"},
              {"name": "AZURE_OPENAI_KEY",                "value": os.environ["SECRET_OPENAI_KEY"]},
              {"name": "AZURE_OPENAI_DEPLOYMENT",         "value": "gpt-oss-120b"},
              {"name": "AZURE_OPENAI_API_VERSION",        "value": "2024-12-01-preview"},
              {"name": "AZURE_SPEECH_KEY",                "value": os.environ["SECRET_SPEECH_KEY"]},
              {"name": "AZURE_SPEECH_REGION",             "value": "italynorth"},
              {"name": "AZURE_SPEECH_VOICE",              "value": "en-US-AvaMultilingualNeural"},
              {"name": "SEARCH_ENDPOINT",                 "value": "https://discoveryai-srch-dev.search.windows.net"},
              {"name": "SEARCH_KEY",                      "value": os.environ["SECRET_SEARCH_KEY"]},
              {"name": "SEARCH_INDEX",                    "value": "knowledgebase"},
              {"name": "COSMOS_ENDPOINT",                 "value": "https://discoveryai-cosmos-dev.documents.azure.com:443/"},
              {"name": "COSMOS_KEY",                      "value": os.environ["SECRET_COSMOS_KEY"]},
              {"name": "COSMOS_DATABASE",                 "value": "discovery"},
              {"name": "COSMOS_CONTAINER",                "value": "sessions"},
              {"name": "STORAGE_CONNECTION_STRING",       "value": os.environ["SECRET_STORAGE_CONN"]},
              {"name": "STORAGE_REPORTS_CONTAINER",       "value": "reports"},
              {"name": "STORAGE_KNOWLEDGEBASE_CONTAINER", "value": "knowledgebase"},
              {"name": "CORS_ORIGINS_RAW",                "value": "https://discoveryaiswadev.z38.web.core.windows.net,http://localhost:5173"},
          ]

          # Patch image and env vars in the container definition
          containers = ca["properties"]["template"]["containers"]
          for c in containers:
              if c.get("name") == "backend":
                  c["image"] = os.environ["APP_IMAGE"]
                  c["env"] = env_vars
                  break
          else:
              # No container named 'backend' — patch the first one
              containers[0]["image"] = os.environ["APP_IMAGE"]
              containers[0]["env"] = env_vars

          with open("/tmp/ca_patch.json", "w") as f:
              json.dump(ca, f)

          print(f"Deploying {os.environ['APP_IMAGE']} with {len(env_vars)} env vars...")

          result = subprocess.run([
              "az", "containerapp", "update",
              "--name", os.environ["APP_NAME"],
              "--resource-group", os.environ["APP_RG"],
              "--yaml", "/tmp/ca_patch.json",
          ], capture_output=True, text=True)

          if result.returncode != 0:
              print("STDOUT:", result.stdout[:2000])
              print("STDERR:", result.stderr[:2000])
              sys.exit(result.returncode)

          out = json.loads(result.stdout)
          rev = out.get("properties", {}).get("latestRevisionName", "?")
          print(f"✅ Deployed revision: {rev}")
          PYEOF

      - name: Verify deployment
        env:
          APP_NAME: discoveryai-ca-backend-${{ needs.build.outputs.deploy_env }}
          APP_RG: rg-discoveryai-${{ needs.build.outputs.deploy_env }}
        run: |
          az containerapp show --name "$APP_NAME" --resource-group "$APP_RG" \
            --query "{fqdn:properties.configuration.ingress.fqdn, state:properties.provisioningState, image:properties.template.containers[0].image}" \
            -o table

      - name: Smoke test health endpoint
        env:
          APP_NAME: discoveryai-ca-backend-${{ needs.build.outputs.deploy_env }}
          APP_RG: rg-discoveryai-${{ needs.build.outputs.deploy_env }}
        run: |
          FQDN=$(az containerapp show --name "$APP_NAME" --resource-group "$APP_RG" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Waiting 25s for revision to warm up..."
          sleep 25
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "https://${FQDN}/health")
          echo "Health HTTP $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Healthy" || (echo "❌ Health check failed"; exit 1)

      - name: Prune old ACR images (keep latest + 2 SHAs)
        run: |
          TAGS=$(az acr repository show-tags --name "discoveryaiacr" \
            --repository backend --orderby time_desc --output tsv \
            | grep -v '^latest$' | tail -n +3)
          [ -z "$TAGS" ] && echo "Nothing to prune." && exit 0
          while IFS= read -r tag; do
            az acr repository delete --name "discoveryaiacr" \
              --image "backend:${tag}" --yes 2>/dev/null \
              && echo "  deleted: $tag" || echo "  skip: $tag"
          done <<< "$TAGS"
          echo "✅ ACR pruned"
