name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, test, prod]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install --quiet -r backend/requirements.txt

      - name: Run pytest
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short --junit-xml=test-results.xml
        env:
          AZURE_OPENAI_ENDPOINT: https://dummy.openai.azure.com/
          AZURE_OPENAI_KEY: dummy
          AZURE_SPEECH_KEY: dummy
          SEARCH_ENDPOINT: https://dummy.search.windows.net
          SEARCH_KEY: dummy
          COSMOS_ENDPOINT: https://dummy.documents.azure.com:443/
          COSMOS_KEY: dummy
          STORAGE_CONNECTION_STRING: ""

      - name: Publish test results
        uses: actions/upload-artifact@v4.4.3
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results.xml

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      deploy_env: ${{ steps.meta.outputs.deploy_env }}

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Azure Login (Workload Identity Federation)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build & push
        id: meta
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          TAG="${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.sha }}"
          docker build -t "$TAG" -t "${{ secrets.ACR_LOGIN_SERVER }}/backend:latest" ./backend
          docker push "$TAG"
          docker push "${{ secrets.ACR_LOGIN_SERVER }}/backend:latest"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "deploy_env=$ENV" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ needs.build.outputs.deploy_env }}
    steps:
      - name: Azure Login (Workload Identity Federation)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Wait for Container App to be ready
        run: |
          ENV="${{ needs.build.outputs.deploy_env }}"
          for i in $(seq 1 18); do
            STATE=$(az containerapp show \
              --name "discoveryai-ca-backend-${ENV}" \
              --resource-group "rg-discoveryai-${ENV}" \
              --query "properties.provisioningState" -o tsv 2>/dev/null)
            echo "  Attempt $i: provisioningState=$STATE"
            if [ "$STATE" = "Succeeded" ] || [ "$STATE" = "Failed" ]; then break; fi
            sleep 10
          done
          [ "$STATE" = "Succeeded" ] && echo "✅ Ready" || (echo "❌ Not ready"; exit 1)

      - name: Sync secrets to Container App secret store
        run: |
          ENV="${{ needs.build.outputs.deploy_env }}"
          # Store sensitive values as Container App secrets (named refs).
          # This runs before the env var update so secretrefs resolve correctly.
          az containerapp secret set \
            --name "discoveryai-ca-backend-${ENV}" \
            --resource-group "rg-discoveryai-${ENV}" \
            --secrets \
              "openai-key=${{ secrets.AZURE_OPENAI_KEY }}" \
              "speech-key=${{ secrets.AZURE_SPEECH_KEY }}" \
              "search-key=${{ secrets.SEARCH_KEY }}" \
              "cosmos-key=${{ secrets.COSMOS_KEY }}" \
              "storage-conn=${{ secrets.STORAGE_CONNECTION_STRING }}"

      - name: Deploy new image + env vars (secrets via secretref)
        run: |
          ENV="${{ needs.build.outputs.deploy_env }}"
          IMAGE="${{ needs.build.outputs.image_tag }}"

          az containerapp update \
            --name "discoveryai-ca-backend-${ENV}" \
            --resource-group "rg-discoveryai-${ENV}" \
            --image "$IMAGE" \
            --set-env-vars \
              "ENV=${ENV}" \
              "LOG_LEVEL=INFO" \
              "AZURE_OPENAI_ENDPOINT=https://discoveryai-aisvc-dev.openai.azure.com/" \
              "AZURE_OPENAI_KEY=secretref:openai-key" \
              "AZURE_OPENAI_DEPLOYMENT=gpt-oss-120b" \
              "AZURE_OPENAI_API_VERSION=2024-12-01-preview" \
              "AZURE_SPEECH_KEY=secretref:speech-key" \
              "AZURE_SPEECH_REGION=italynorth" \
              "AZURE_SPEECH_VOICE=en-US-AvaMultilingualNeural" \
              "SEARCH_ENDPOINT=https://discoveryai-srch-dev.search.windows.net" \
              "SEARCH_KEY=secretref:search-key" \
              "SEARCH_INDEX=knowledgebase" \
              "COSMOS_ENDPOINT=https://discoveryai-cosmos-dev.documents.azure.com:443/" \
              "COSMOS_KEY=secretref:cosmos-key" \
              "COSMOS_DATABASE=discovery" \
              "COSMOS_CONTAINER=sessions" \
              "STORAGE_CONNECTION_STRING=secretref:storage-conn" \
              "STORAGE_REPORTS_CONTAINER=reports" \
              "STORAGE_KNOWLEDGEBASE_CONTAINER=knowledgebase" \
              "CORS_ORIGINS_RAW=https://discoveryaiswadev.z38.web.core.windows.net,http://localhost:5173"

      - name: Verify deployment
        run: |
          ENV="${{ needs.build.outputs.deploy_env }}"
          az containerapp show \
            --name "discoveryai-ca-backend-${ENV}" \
            --resource-group "rg-discoveryai-${ENV}" \
            --query "{fqdn:properties.configuration.ingress.fqdn, state:properties.provisioningState, image:properties.template.containers[0].image}" \
            -o table

      - name: Smoke test health endpoint
        run: |
          FQDN=$(az containerapp show \
            --name "discoveryai-ca-backend-${{ needs.build.outputs.deploy_env }}" \
            --resource-group "rg-discoveryai-${{ needs.build.outputs.deploy_env }}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "https://${FQDN}/health")
          echo "Health HTTP $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Healthy" || (echo "❌ Health check failed"; exit 1)

      - name: Prune old ACR images (keep latest + 2 SHAs)
        run: |
          TAGS=$(az acr repository show-tags \
            --name "${{ secrets.ACR_NAME }}" \
            --repository backend \
            --orderby time_desc \
            --output tsv | grep -v '^latest$' | tail -n +3)
          [ -z "$TAGS" ] && echo "Nothing to prune." && exit 0
          while IFS= read -r tag; do
            az acr repository delete --name "${{ secrets.ACR_NAME }}" \
              --image "backend:${tag}" --yes 2>/dev/null \
              && echo "  deleted: $tag" || echo "  skip: $tag"
          done <<< "$TAGS"
          echo "✅ ACR pruned"
