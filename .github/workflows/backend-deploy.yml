name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, test, prod]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      deploy_env: ${{ steps.meta.outputs.deploy_env }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (Workload Identity Federation)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build & push
        id: meta
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          TAG="${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.sha }}"
          docker build -t "$TAG" ./backend
          docker build -t "${{ secrets.ACR_LOGIN_SERVER }}/backend:latest" ./backend
          docker push "$TAG"
          docker push "${{ secrets.ACR_LOGIN_SERVER }}/backend:latest"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "deploy_env=$ENV" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ needs.build.outputs.deploy_env }}
    steps:
      - name: Azure Login (Workload Identity Federation)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Attach ACR credentials to Container App
        continue-on-error: true   # credentials already set; skip if operation in progress
        run: |
          ENV="${{ needs.build.outputs.deploy_env }}"
          az containerapp registry set \
            --name "discoveryai-ca-backend-${ENV}" \
            --resource-group "rg-discoveryai-${ENV}" \
            --server "${{ secrets.ACR_LOGIN_SERVER }}" \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password "${{ secrets.ACR_PASSWORD }}"

      - name: Wait for Container App to be ready
        run: |
          ENV="${{ needs.build.outputs.deploy_env }}"
          echo "Waiting for any in-progress operation to complete..."
          for i in $(seq 1 12); do
            STATE=$(az containerapp show \
              --name "discoveryai-ca-backend-${ENV}" \
              --resource-group "rg-discoveryai-${ENV}" \
              --query "properties.provisioningState" -o tsv 2>/dev/null)
            echo "  Attempt $i: provisioningState=$STATE"
            if [ "$STATE" = "Succeeded" ] || [ "$STATE" = "Failed" ]; then
              break
            fi
            sleep 10
          done

      - name: Update Container App image
        run: |
          ENV="${{ needs.build.outputs.deploy_env }}"
          az containerapp update \
            --name "discoveryai-ca-backend-${ENV}" \
            --resource-group "rg-discoveryai-${ENV}" \
            --image "${{ needs.build.outputs.image_tag }}"

      - name: Verify deployment
        run: |
          ENV="${{ needs.build.outputs.deploy_env }}"
          az containerapp show \
            --name "discoveryai-ca-backend-${ENV}" \
            --resource-group "rg-discoveryai-${ENV}" \
            --query "{fqdn:properties.configuration.ingress.fqdn,state:properties.provisioningState}" \
            -o table

      - name: Prune old ACR images (keep latest + 2 most recent SHAs)
        run: |
          # Get all SHA tags sorted newest-first, skip the 2 we want to keep
          TAGS=$(az acr repository show-tags \
            --name "${{ secrets.ACR_NAME }}" \
            --repository backend \
            --orderby time_desc \
            --output tsv | grep -v '^latest$' | tail -n +3)

          if [ -z "$TAGS" ]; then
            echo "Nothing to prune."
          else
            echo "Pruning tags:"
            echo "$TAGS"
            while IFS= read -r tag; do
              az acr repository delete \
                --name "${{ secrets.ACR_NAME }}" \
                --image "backend:${tag}" \
                --yes 2>/dev/null && echo "  deleted: $tag" || echo "  skip: $tag"
            done <<< "$TAGS"
          fi
          echo "✅ ACR pruned — keeping latest + 2 most recent SHAs"
