name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, test, prod]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install --quiet -r backend/requirements.txt

      - name: Run pytest
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short --junit-xml=test-results.xml
        env:
          AZURE_OPENAI_ENDPOINT: https://dummy.openai.azure.com/
          AZURE_OPENAI_KEY: dummy
          AZURE_SPEECH_KEY: dummy
          SEARCH_ENDPOINT: https://dummy.search.windows.net
          SEARCH_KEY: dummy
          COSMOS_ENDPOINT: https://dummy.documents.azure.com:443/
          COSMOS_KEY: dummy
          STORAGE_CONNECTION_STRING: ""

      - name: Publish test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results.xml

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      deploy_env: ${{ steps.meta.outputs.deploy_env }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (Workload Identity Federation)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build & push
        id: meta
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          TAG="${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.sha }}"
          docker build -t "$TAG" ./backend
          docker build -t "${{ secrets.ACR_LOGIN_SERVER }}/backend:latest" ./backend
          docker push "$TAG"
          docker push "${{ secrets.ACR_LOGIN_SERVER }}/backend:latest"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "deploy_env=$ENV" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ needs.build.outputs.deploy_env }}
    steps:
      - name: Azure Login (Workload Identity Federation)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Attach ACR credentials to Container App
        id: acr_attach
        continue-on-error: true
        run: |
          ENV="${{ needs.build.outputs.deploy_env }}"
          az containerapp registry set \
            --name "discoveryai-ca-backend-${ENV}" \
            --resource-group "rg-discoveryai-${ENV}" \
            --server "${{ secrets.ACR_LOGIN_SERVER }}" \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password "${{ secrets.ACR_PASSWORD }}"

      - name: Log ACR credential attachment result
        run: |
          if [ "${{ steps.acr_attach.outcome }}" = "success" ]; then
            echo "✅ ACR credentials attached successfully."
          else
            echo "⚠️  ACR credential attachment failed or was skipped (outcome: ${{ steps.acr_attach.outcome }})."
            echo "    This is non-fatal — credentials may already be set on the Container App."
          fi

      - name: Wait for Container App to be ready
        run: |
          ENV="${{ needs.build.outputs.deploy_env }}"
          STATE=""
          for i in $(seq 1 12); do
            STATE=$(az containerapp show \
              --name "discoveryai-ca-backend-${ENV}" \
              --resource-group "rg-discoveryai-${ENV}" \
              --query "properties.provisioningState" -o tsv 2>/dev/null)
            echo "  Attempt $i: provisioningState=$STATE"
            if [ "$STATE" = "Succeeded" ] || [ "$STATE" = "Failed" ]; then break; fi
            sleep 10
          done
          if [ "$STATE" != "Succeeded" ]; then echo "❌ Not ready"; exit 1; fi
          echo "✅ Container App is ready."

      - name: Update Container App image
        run: |
          ENV="${{ needs.build.outputs.deploy_env }}"
          # Update image only — do NOT pass --set-env-vars here.
          # Env vars are managed separately (set once via az containerapp update or pipeline secrets).
          # Passing --set-env-vars alongside --image replaces ALL env vars with only those listed.
          az containerapp update \
            --name "discoveryai-ca-backend-${ENV}" \
            --resource-group "rg-discoveryai-${ENV}" \
            --image "${{ needs.build.outputs.image_tag }}" \
            --set-env-vars \
              "AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              "AZURE_OPENAI_KEY=" \
              "AZURE_FOUNDRY_ENDPOINT=https://discoveryai-aisvc-dev.cognitiveservices.azure.com/" \
              "AZURE_OPENAI_DEPLOYMENT=gpt-oss-120b" \
              "AZURE_OPENAI_API_VERSION=2024-12-01-preview" \
              "AZURE_SPEECH_KEY=${{ secrets.AZURE_SPEECH_KEY }}" \
              "AZURE_SPEECH_REGION=italynorth" \
              "AZURE_SPEECH_VOICE=en-US-AvaMultilingualNeural" \
              "SEARCH_ENDPOINT=${{ secrets.SEARCH_ENDPOINT }}" \
              "SEARCH_KEY=${{ secrets.SEARCH_KEY }}" \
              "SEARCH_INDEX=knowledgebase" \
              "COSMOS_ENDPOINT=${{ secrets.COSMOS_ENDPOINT }}" \
              "COSMOS_KEY=${{ secrets.COSMOS_KEY }}" \
              "COSMOS_DATABASE=discovery" \
              "COSMOS_CONTAINER=sessions" \
              "STORAGE_CONNECTION_STRING=${{ secrets.STORAGE_CONNECTION_STRING }}" \
              "STORAGE_REPORTS_CONTAINER=reports" \
              "STORAGE_KNOWLEDGEBASE_CONTAINER=knowledgebase" \
              "CORS_ORIGINS_RAW=https://discoveryaiswadev.z38.web.core.windows.net,http://localhost:5173" \
              "LOG_LEVEL=INFO" \
              "ENV=${ENV}"

      - name: Verify deployment
        run: |
          ENV="${{ needs.build.outputs.deploy_env }}"
          az containerapp show \
            --name "discoveryai-ca-backend-${ENV}" \
            --resource-group "rg-discoveryai-${ENV}" \
            --query "{fqdn:properties.configuration.ingress.fqdn,state:properties.provisioningState}" \
            -o table

      - name: Prune old ACR images (keep latest + 2 most recent SHAs)
        run: |
          TAGS=$(az acr repository show-tags \
            --name "${{ secrets.ACR_NAME }}" \
            --repository backend \
            --orderby time_desc \
            --output tsv | grep -v '^latest$' | tail -n +3)
          if [ -z "$TAGS" ]; then
            echo "Nothing to prune."
          else
            while IFS= read -r tag; do
              az acr repository delete \
                --name "${{ secrets.ACR_NAME }}" \
                --image "backend:${tag}" \
                --yes 2>/dev/null && echo "  deleted: $tag" || echo "  skip: $tag"
            done <<< "$TAGS"
          fi
          echo "✅ ACR pruned — keeping latest + 2 most recent SHAs"
