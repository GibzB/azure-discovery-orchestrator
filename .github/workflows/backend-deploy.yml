name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, test, prod]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install --quiet -r backend/requirements.txt

      - name: Run pytest
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short --junit-xml=test-results.xml
        env:
          AZURE_OPENAI_ENDPOINT: https://dummy.openai.azure.com/
          AZURE_OPENAI_KEY: dummy
          AZURE_SPEECH_KEY: dummy
          SEARCH_ENDPOINT: https://dummy.search.windows.net
          SEARCH_KEY: dummy
          COSMOS_ENDPOINT: https://dummy.documents.azure.com:443/
          COSMOS_KEY: dummy
          STORAGE_CONNECTION_STRING: ""

      - name: Publish test results
        uses: actions/upload-artifact@v4.4.3
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results.xml

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      image_sha: ${{ steps.meta.outputs.image_sha }}
      deploy_env: ${{ steps.meta.outputs.deploy_env }}

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Azure Login (Workload Identity Federation)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name discoveryaiacr

      - name: Build & push
        id: meta
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          SHA="${{ github.sha }}"
          docker build \
            -t "discoveryaiacr.azurecr.io/backend:${SHA}" \
            -t "discoveryaiacr.azurecr.io/backend:latest" \
            ./backend
          docker push "discoveryaiacr.azurecr.io/backend:${SHA}"
          docker push "discoveryaiacr.azurecr.io/backend:latest"
          echo "image_sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "deploy_env=${ENV}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ needs.build.outputs.deploy_env }}

    steps:
      - name: Azure Login (Workload Identity Federation)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Wait for Container App to be ready
        run: |
          APP="discoveryai-ca-backend-${{ needs.build.outputs.deploy_env }}"
          RG="rg-discoveryai-${{ needs.build.outputs.deploy_env }}"
          for i in $(seq 1 18); do
            STATE=$(az containerapp show --name "$APP" --resource-group "$RG" \
              --query "properties.provisioningState" -o tsv 2>/dev/null)
            echo "  Attempt $i: $STATE"
            [ "$STATE" = "Succeeded" ] || [ "$STATE" = "Failed" ] && break
            sleep 10
          done
          [ "$STATE" = "Succeeded" ] && echo "✅ Ready" || (echo "❌ Not ready: $STATE"; exit 1)

      - name: Refresh ACR pull credentials
        continue-on-error: true
        run: |
          APP="discoveryai-ca-backend-${{ needs.build.outputs.deploy_env }}"
          RG="rg-discoveryai-${{ needs.build.outputs.deploy_env }}"
          ACR_PWD=$(az acr credential show --name discoveryaiacr --query "passwords[0].value" -o tsv)
          az containerapp registry set \
            --name "$APP" --resource-group "$RG" \
            --server "discoveryaiacr.azurecr.io" \
            --username "discoveryaiacr" \
            --password "$ACR_PWD" && echo "✅ ACR credentials refreshed" || echo "⚠️ ACR refresh skipped (already set or in-progress)"

      - name: Wait again after registry update
        run: |
          APP="discoveryai-ca-backend-${{ needs.build.outputs.deploy_env }}"
          RG="rg-discoveryai-${{ needs.build.outputs.deploy_env }}"
          for i in $(seq 1 12); do
            STATE=$(az containerapp show --name "$APP" --resource-group "$RG" \
              --query "properties.provisioningState" -o tsv 2>/dev/null)
            echo "  Attempt $i: $STATE"
            [ "$STATE" = "Succeeded" ] || [ "$STATE" = "Failed" ] && break
            sleep 10
          done
          [ "$STATE" = "Succeeded" ] && echo "✅ Ready" || (echo "❌ Not ready: $STATE"; exit 1)

      - name: Update image only
        # Env vars are managed directly on the Container App (set via az CLI, not pipeline).
        # Image-only update preserves all existing env vars.
        run: |
          APP="discoveryai-ca-backend-${{ needs.build.outputs.deploy_env }}"
          RG="rg-discoveryai-${{ needs.build.outputs.deploy_env }}"
          IMAGE="discoveryaiacr.azurecr.io/backend:${{ needs.build.outputs.image_sha }}"
          az containerapp update \
            --name "$APP" --resource-group "$RG" \
            --image "$IMAGE"
          echo "✅ Deployed $IMAGE"

      - name: Verify deployment
        run: |
          APP="discoveryai-ca-backend-${{ needs.build.outputs.deploy_env }}"
          RG="rg-discoveryai-${{ needs.build.outputs.deploy_env }}"
          az containerapp show --name "$APP" --resource-group "$RG" \
            --query "{fqdn:properties.configuration.ingress.fqdn, state:properties.provisioningState, image:properties.template.containers[0].image}" \
            -o table

      - name: Smoke test health endpoint
        run: |
          APP="discoveryai-ca-backend-${{ needs.build.outputs.deploy_env }}"
          RG="rg-discoveryai-${{ needs.build.outputs.deploy_env }}"
          FQDN=$(az containerapp show --name "$APP" --resource-group "$RG" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Waiting 25s for revision to warm up..."
          sleep 25
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "https://${FQDN}/health")
          echo "Health HTTP $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Healthy" || (echo "❌ Health check failed"; exit 1)

      - name: Prune old ACR images (keep latest + 2 SHAs)
        run: |
          TAGS=$(az acr repository show-tags --name "discoveryaiacr" \
            --repository backend --orderby time_desc --output tsv \
            | grep -v '^latest$' | tail -n +3)
          [ -z "$TAGS" ] && echo "Nothing to prune." && exit 0
          while IFS= read -r tag; do
            az acr repository delete --name "discoveryaiacr" \
              --image "backend:${tag}" --yes 2>/dev/null \
              && echo "  deleted: $tag" || echo "  skip: $tag"
          done <<< "$TAGS"
          echo "✅ ACR pruned"
